name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  check:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: scripts/check.sh
