source_root = "."
site_root = "../glance-site"

[generation]
provider_mode = "mock"

[generation.budget]
per_run_micros = 5000000
per_day_micros = 20000000
spent_today_micros = 0

[generation.prompt]
max_file_bytes = 65536

[generation.image]
budget_per_run = 4
provider = "gemini"
model = "gemini-3.1-flash-lite-image"
endpoint_base = "https://generativelanguage.googleapis.com/v1beta"
aspect_ratio = "16:9"

[generation.retry]
max_attempts = 3
base_backoff_millis = 200
jitter_millis = 75

[generation.routing.leaf]
tier = "cheap"
provider = "open-router"
model = "deepseek/deepseek-v4-flash"
max_tokens = 6000
input_micros_per_million_tokens = 140000
output_micros_per_million_tokens = 280000

[generation.routing.interior]
tier = "mid"
provider = "open-router"
model = "anthropic/claude-sonnet-5"
max_tokens = 10000
input_micros_per_million_tokens = 2000000
output_micros_per_million_tokens = 10000000

[generation.routing.root]
tier = "frontier"
provider = "open-router"
model = "openai/gpt-5.5"
max_tokens = 16000
input_micros_per_million_tokens = 5000000
output_micros_per_million_tokens = 30000000
